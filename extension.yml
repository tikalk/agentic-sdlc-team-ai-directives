schema_version: "1.0"

extension:
  id: "team-ai-directives"
  name: "Team AI Directives"
  version: "1.2.0"
  description: "Team-specific AI agent context, skills, and conventions for Spec-Driven Development"
  author: "Team"
  repository: "https://github.com/tikal/agentic-sdlc-team-ai-directives"
  license: "MIT"

requires:
  speckit_version: ">=0.3.0"

provides:
  commands:
    - name: "adlc.team-ai-directives.verify"
      file: "commands/verify.md"
      description: "Verify team-ai-directives installation and health check"
      aliases: ["team-ai-directives.verify"]
    
    - name: "adlc.team-ai-directives.discover"
      file: "commands/discover.md"
      description: "Discover relevant context from team-ai-directives for current feature"
      aliases: ["team-ai-directives.discover"]

hooks:
  before_specify:
    command: adlc.team-ai-directives.discover
    optional: false
    description: "Auto-discover personas, rules, and examples from team-ai-directives"
  
  before_plan:
    command: adlc.team-ai-directives.discover
    optional: false
    description: "Auto-discover architecture patterns and implementation guidelines"

tags:
  - "team-directives"
  - "context"
  - "skills"
